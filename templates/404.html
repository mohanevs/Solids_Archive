<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Commissioner:wght@100..900&family=Imperial+Script&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/images/gear.png">
    <title>404 - Solids Archive</title>
</head>
<body>

    <div class="notFoundPage">
        <svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">

            <!-- floor -->
            <line x1="0" y1="420" x2="680" y2="420" stroke="#111" stroke-width="2"/>
            <!-- wall -->
            <line x1="540" y1="0" x2="540" y2="420" stroke="#111" stroke-width="2"/>

            <!-- light beam -->
            <polygon points="178,198 500,105 500,315" fill="#f0f0f0" opacity="0.85"/>

            <!-- torch spot circle -->
            <circle cx="500" cy="210" r="105" fill="#111"/>
            <text x="500" y="200" text-anchor="middle"
                font-family="Commissioner, sans-serif" font-size="46"
                font-weight="700" fill="#fff">404</text>
            <text x="500" y="248" text-anchor="middle"
                font-family="Commissioner, sans-serif" font-size="16"
                font-weight="400" fill="#ccc">not found</text>
            <circle cx="500" cy="210" r="105" fill="none" stroke="#ddd" stroke-width="3"/>

            <!-- stick figure -->
            <circle cx="130" cy="170" r="18" fill="none" stroke="#111" stroke-width="2.5"/>
            <line x1="130" y1="188" x2="130" y2="300" stroke="#111" stroke-width="2.5"/>
            <line x1="130" y1="300" x2="108" y2="370" stroke="#111" stroke-width="2.5"/>
            <line x1="130" y1="300" x2="152" y2="370" stroke="#111" stroke-width="2.5"/>
            <line x1="108" y1="370" x2="90" y2="375" stroke="#111" stroke-width="2.5"/>
            <line x1="152" y1="370" x2="168" y2="375" stroke="#111" stroke-width="2.5"/>
            <line x1="130" y1="230" x2="175" y2="195" stroke="#111" stroke-width="2.5"/>
            <line x1="130" y1="230" x2="105" y2="285" stroke="#111" stroke-width="2.5"/>

            <!-- torch -->
            <rect x="168" y="186" width="22" height="10" rx="3"
                fill="#111" transform="rotate(-25, 179, 191)"/>
            <circle cx="188" cy="196" r="4" fill="#fff" stroke="#111" stroke-width="1.5"/>

            <!-- figure shadow -->
            <ellipse cx="130" cy="422" rx="28" ry="5" fill="#ccc"/>

        </svg>

        <a href="/" class="backHomeBtn">Back to Home</a>
    </div>

</body>
</html>
