<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Imperial+Script&family=Lavishly+Yours&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=book" />
    <link
        href="https://fonts.googleapis.com/css2?family=Commissioner:wght@100..900&family=Imperial+Script&family=Lavishly+Yours&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="/images/gear.png">
    <title>Solids Archive Search</title>
</head>

<body>

    <div class="searchBar">
        <input type="text" id="searchInput" placeholder="Search by name...">

        <div class="filterBtns">
            <button class="filterBtn active" data-category="all">All</button>
            <button class="filterBtn" data-category="3D Model">3D Model</button>
            <button class="filterBtn" data-category="Assembled">Assembly</button>
            <button class="filterBtn" data-category="Drawing">Drawing</button>
        </div>
    </div>

    <div class="cardGrid">
        {% for item in items %}
        <div class="card" data-category="{{ item.category }}" data-name="{{ item.name | lower }}">
            <div class="card-img">
                <img src="{{ item.image }}" alt="{{ item.name }}">
            </div>
            <div class="card-body">
                <h3>{{ item.name }}</h3>
                <span class="card-tag">{{ item.category }}</span>
                <a href="{{ item.url }}" target="_blank">
                    <button class="card-btn">Get</button>
                </a>
            </div>
        </div>
        {% endfor %}
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filterBtn');
        const cards = document.querySelectorAll('.card');

        let activeCategory = 'all';

        const urlParams = new URLSearchParams(window.location.search);
        const categoryFromUrl = urlParams.get('category');

        if (categoryFromUrl) {
            filterBtns.forEach(b => b.classList.remove('active'));
            const matchingBtn = document.querySelector(`.filterBtn[data-category="${categoryFromUrl}"]`);
            if (matchingBtn) {
                matchingBtn.classList.add('active');
                activeCategory = categoryFromUrl;
            }
        }

        function applyFilters() {
            const searchTerm = searchInput.value.toLowerCase().trim();

            cards.forEach(card => {
                const name = card.dataset.name;
                const category = card.dataset.category;

                const matchesCategory = activeCategory === 'all' || category === activeCategory;
                const matchesSearch = name.includes(searchTerm);

                if (matchesCategory && matchesSearch) {
                    card.style.display = '';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        applyFilters();

        searchInput.addEventListener('input', applyFilters);

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                activeCategory = btn.dataset.category;
                applyFilters();
            });
        });
    </script>

</body>

</html>
